# Lean custom VGG-style CNN, from scratch, ALL data — the "small capacity" member.
# Motivated by Veeling et al. 2018 (PCam): ~120K-param nets beat big ImageNet
# backbones there. Hypothesis: low capacity mirages far less than the big
# from-scratch nets (val 0.964 -> private 0.832) while staying decorrelated from the
# pretrained champion -> a strong, honest ensemble member.
seed: 1337
data:
  root: /kaggle/input/histopathologic-cancer-detection
  train_dir: train
  test_dir: test
  labels_csv: train_labels.csv
  image_ext: .tif
  image_size: 96
  val_fraction: 0.1
  wsi_map_csv: ./data/wsi/patch_id_wsi_full.csv.gz
  sample_n: null
  cache: true
train:
  batch_size: 256
  epochs_head: 30
  epochs_finetune: 0
  lr_head: 0.001
  lr_finetune: 1.0e-05
  finetune_unfreeze_layers: 40
  dropout: 0.3
  label_smoothing: 0.0
  early_stopping_patience: 5
  reduce_lr_patience: 2
  mixed_precision: true
  from_scratch: true
model:
  backbone: TinyVGG
  weights: null
augment:
  horizontal_flip: true
  vertical_flip: true          # D4 symmetry (rot+reflect) via augmentation + TTA
  rotation_factor: 0.5
  contrast_factor: 0.1
paths:
  out_dir: ./artifacts
  best_ckpt: best.keras
  history_csv: history.csv
  submission_csv: submission.csv
